    <title>404 - Page Not Found | GROUND Inc.</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFFFFF;
            color: #0A0C14;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .error-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        /* Background decorative elements */
        .error-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .background-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.03;
        }

        .circle-1 {
            width: 500px;
            height: 500px;
            background-color: #3B82F6;
            top: -200px;
            right: -100px;
        }

        .circle-2 {
            width: 400px;
            height: 400px;
            background-color: #0A0C14;
            bottom: -150px;
            left: -100px;
        }

        /* Logo section */
        .logo-section {
            margin-bottom: 3rem;
            text-align: center;
        }

        .logo-section img {
            height: 50px;
            width: auto;
        }

        /* Error code section */
        .error-code {
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: #0A0C14;
            line-height: 1;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        /* Main content */
        .error-content {
            text-align: center;
            max-width: 600px;
        }

        .error-japanese {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 600;
            color: #0A0C14;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        .error-subtitle {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: #666666;
            margin-bottom: 2.5rem;
            font-weight: 400;
        }

        .error-description {
            font-size: 1rem;
            color: #888888;
            margin-bottom: 3rem;
            line-height: 1.8;
        }

        /* Call-to-action buttons */
        .cta-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            margin-bottom: 2rem;
        }

        @media (min-width: 640px) {
            .cta-buttons {
                flex-direction: row;
                justify-content: center;
                gap: 1.5rem;
                width: auto;
            }
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            border-radius: 0.5rem;
            min-width: 160px;
        }

        .btn-primary {
            background-color: #3B82F6;
            color: #FFFFFF;
        }

        .btn-primary:hover {
            background-color: #2563EB;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.2);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background-color: transparent;
            color: #0A0C14;
            border: 2px solid #0A0C14;
        }

        .btn-secondary:hover {
            background-color: #0A0C14;
            color: #FFFFFF;
            transform: translateY(-2px);
        }

        .btn-secondary:active {
            transform: translateY(0);
        }

        /* Footer link */
        .footer-link {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #E5E5E5;
            font-size: 0.875rem;
            color: #888888;
        }

        .footer-link a {
            color: #3B82F6;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .footer-link a:hover {
            color: #2563EB;
            text-decoration: underline;
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            .error-container {
                padding: 1.5rem;
            }

            .logo-section {
                margin-bottom: 2rem;
            }

            .error-code {
                margin-bottom: 0.25rem;
            }

            .cta-buttons {
                margin-bottom: 1.5rem;
            }

            .btn {
                width: 100%;
                padding: 0.875rem 1.5rem;
            }
        }
    </style>
    <link rel="manifest" href="/manifest.json">
</head>
<body>
    <div class="error-background">
        <div class="background-circle circle-1"></div>
        <div class="background-circle circle-2"></div>
    </div>

    <div class="error-container">
        <div class="logo-section">
            <img src="img/ground-logo-v2.svg" alt="GROUND Inc.">
        </div>

        <div class="error-content">
            <div class="error-code">404</div>

            <div class="error-japanese">ページが見つかりません</div>

            <div class="error-subtitle">The page you're looking for doesn't exist.</div>

            <div class="error-description">
                It looks like this page has been moved or deleted. Let us help you find what you need.
            </div>

            <div class="cta-buttons">
                <a href="index.html" class="btn btn-primary">Back to Home</a>
                <a href="contact.html" class="btn btn-secondary">Contact Us</a>
            </div>

            <div class="footer-link">
                Need help? <a href="contact.html">Get in touch with our team</a>
            </div>
        </div>
    </div>
<!-- Cookie Consent Banner -->
<div id="cc-banner" class="cc-banner" role="dialog" aria-labelledby="cc-title">
  <div class="cc-banner__content">
    <p id="cc-title" class="cc-banner__text">当サイトでは、サービス向上のためCookieを使用しています。</p>
    <div class="cc-banner__buttons">
      <button id="cc-accept" class="cc-banner__button cc-banner__button--accept" aria-label="同意する">同意する</button>
      <a href="privacy.html" class="cc-banner__link" aria-label="詳細">詳細</a>
    </div>
  </div>
</div>

<style>
  .cc-banner {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background-color: rgba(10, 12, 20, 0.95);
    z-index: 9999;
    padding: 16px 20px;
    box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.2);
    font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    animation: cc-slide-up 0.3s ease-out;
    display: none;
  }

  .cc-banner.cc-show {
    display: block;
  }

  @keyframes cc-slide-up {
    from {
      transform: translateY(100%);
      opacity: 0;
    }
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  @keyframes cc-slide-down {
    from {
      transform: translateY(0);
      opacity: 1;
    }
    to {
      transform: translateY(100%);
      opacity: 0;
    }
  }

  .cc-banner.cc-hide {
    animation: cc-slide-down 0.3s ease-in forwards;
  }

  .cc-banner__content {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .cc-banner__text {
    color: #ffffff;
    font-size: 13px;
    line-height: 1.5;
    margin: 0;
    flex: 1;
  }

  .cc-banner__buttons {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .cc-banner__button {
    padding: 8px 16px;
    background-color: #3B82F6;
    color: #ffffff;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    transition: background-color 0.2s ease;
    white-space: nowrap;
  }

  .cc-banner__button:hover {
    background-color: #2563EB;
  }

  .cc-banner__button:active {
    background-color: #1D4ED8;
  }

  .cc-banner__link {
    color: #ffffff;
    text-decoration: underline;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s ease;
  }

  .cc-banner__link:hover {
    opacity: 0.8;
  }

  /* Mobile responsive */
  @media (max-width: 640px) {
    .cc-banner__content {
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }

    .cc-banner__buttons {
      width: 100%;
      gap: 8px;
    }

    .cc-banner__button {
      flex: 1;
    }

    .cc-banner__link {
      flex: 1;
    }
  }
</style>

<script>
  (function() {
    const CONSENT_KEY = 'ground_cookie_consent';
    const banner = document.getElementById('cc-banner');
    const acceptBtn = document.getElementById('cc-accept');

    function getConsent() {
      try {
        return localStorage.getItem(CONSENT_KEY);
      } catch (e) {
        return null;
      }
    }

    function setConsent(value) {
      try {
        localStorage.setItem(CONSENT_KEY, value);
      } catch (e) {
        // Fallback if localStorage is not available
      }
    }

    function hideBanner() {
      if (banner) {
        banner.classList.remove('cc-show');
        banner.classList.add('cc-hide');
        setTimeout(() => {
          banner.style.display = 'none';
        }, 300);
      }
    }

    function showBanner() {
      if (banner) {
        banner.classList.add('cc-show');
        banner.classList.remove('cc-hide');
      }
    }

    // Check if consent was already given
    if (!getConsent()) {
      showBanner();
    }

    // Accept button handler
    if (acceptBtn) {
      acceptBtn.addEventListener('click', function() {
        setConsent('accepted');
        hideBanner();
      });
    }

    // Close banner on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && banner && banner.classList.contains('cc-show')) {
        setConsent('accepted');
        hideBanner();
      }
    });
  })();
</script>

</body>
</html>
