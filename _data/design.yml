# =============================================
# サイトデザイン設定 (CMS / ビジュアルエディターから編集可能)
# =============================================

# ── ロゴ設定 ──
logo_height: 50
logo_margin_top: 0
logo_margin_left: 0

# ── ヘッダー設定 ──
header_bg_color: "#0A0C14"
header_height: 64

# ── カラー設定 ──
# Titanium palette: ブルースケールで統一
primary_color: "#3B82F6"
accent_color: "#60A5FA"
cta_color: "#2563EB"
text_color: "#1A1A1A"
body_bg_color: "#FFFFFF"

# ── フォント設定 ──
heading_font_size: 28
body_font_size: 15
nav_font_size: 14

# ── ヒーロー設定 ──
hero_overlay_opacity: 30
hero_title_size: 80
hero_title_top: 0
hero_title_left: 0
hero_subtitle_size: 20

# ── ホームページ セクション表示 ──
show_news: true
show_clients: true
show_solution: true
show_casestudy: true
show_recruit: true

# ── フッター設定 ──
footer_bg_color: "#0A0C14"
footer_text_color: "#FFFFFF"
