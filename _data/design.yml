# =============================================
# サイトデザイン設定 (CMS / ビジュアルエディターから編集可能)
# =============================================

# ── ロゴ設定 ──
logo_height: 26
logo_margin_top: 0
logo_margin_left: 0

# ── ヘッダー設定 ──
header_bg_color: "#0A0C14"
header_height: 64

# ── カラー設定 ──
primary_color: "#545867"
accent_color: "#5BC0EB"
cta_color: "#E8614D"
text_color: "#1A1A1A"
body_bg_color: "#FFFFFF"

# ── フォント設定 ──
heading_font_size: 28
body_font_size: 15
nav_font_size: 14

# ── ヒーロー設定 ──
hero_overlay_opacity: 30
hero_title_size: 80

# ── ホームページ セクション表示 ──
show_news: true
show_clients: true
show_solution: true
show_casestudy: true
show_recruit: true

# ── フッター設定 ──
footer_bg_color: "#0A0C14"
footer_text_color: "#8A8C9A"
