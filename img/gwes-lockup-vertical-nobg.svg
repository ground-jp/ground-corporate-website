  <!-- Shadow ellipse -->
  <ellipse cx="100" cy="130" rx="30" ry="6" fill="url(#shadow)"/>

  <!-- Divider line -->
  <line x1="82" y1="138" x2="118" y2="138" stroke="#6ac6ec" stroke-width="0.8" opacity="0.4"/>

  <!-- GWES text -->
  <text x="100" y="158" text-anchor="middle"
        font-family="'Archivo','Helvetica Neue',Arial,sans-serif"
        font-weight="400" font-size="18" letter-spacing="5"
        fill="#FFFFFF">GWES</text>

  <!-- Tagline -->
  <text x="100" y="172" text-anchor="middle"
        font-family="'Inter',sans-serif"
        font-weight="400" font-size="7" letter-spacing="0.84"
        fill="#FFFFFF" opacity="0.7">The OS for Autonomous Warehouse</text>
