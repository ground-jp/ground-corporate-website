  <!-- Float Shadow -->
  <ellipse cx="100" cy="112" rx="30" ry="8" fill="url(#shadow)"/>

  <!-- Divider: #6AC6EC (Divider Cyan) — NO opacity attr -->
  <line x1="82" y1="122" x2="118" y2="122" stroke="#6AC6EC" stroke-width="1"/>

  <!-- GWES: Archivo Regular 400 -->
  <text x="100" y="142" text-anchor="middle"
        font-family="'Archivo','Helvetica Neue',Arial,sans-serif"
        font-weight="400" font-size="18" letter-spacing="5"
        fill="#FFFFFF">GWES</text>

  <!-- Tagline: Inter Regular 400 -->
  <text x="100" y="156" text-anchor="middle"
        font-family="'Inter',sans-serif"
        font-weight="400" font-size="7" letter-spacing="0.84"
        fill="#FFFFFF" opacity="0.7">The OS for Autonomous Warehouse</text>
</svg>
