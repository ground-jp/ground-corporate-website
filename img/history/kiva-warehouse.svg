<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0C14;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Grid floor -->
  <g stroke="rgba(59,130,246,0.15)" stroke-width="1" fill="none">
    <line x1="100" y1="300" x2="700" y2="300"/>
    <line x1="100" y1="260" x2="700" y2="260"/>
    <line x1="100" y1="340" x2="700" y2="340"/>
    <line x1="200" y1="200" x2="200" y2="380"/>
    <line x1="350" y1="200" x2="350" y2="380"/>
    <line x1="500" y1="200" x2="500" y2="380"/>
    <line x1="650" y1="200" x2="650" y2="380"/>
  </g>
  <!-- Shelving units -->
  <g fill="rgba(59,130,246,0.25)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5">
    <rect x="160" y="120" width="60" height="160" rx="4"/>
    <rect x="310" y="100" width="60" height="180" rx="4"/>
    <rect x="460" y="130" width="60" height="150" rx="4"/>
    <rect x="610" y="110" width="60" height="170" rx="4"/>
  </g>
  <!-- Shelf lines -->
  <g stroke="rgba(59,130,246,0.3)" stroke-width="1">
    <line x1="165" y1="160" x2="215" y2="160"/>
    <line x1="165" y1="200" x2="215" y2="200"/>
    <line x1="165" y1="240" x2="215" y2="240"/>
    <line x1="315" y1="140" x2="365" y2="140"/>
    <line x1="315" y1="180" x2="365" y2="180"/>
    <line x1="315" y1="220" x2="365" y2="220"/>
    <line x1="465" y1="170" x2="515" y2="170"/>
    <line x1="465" y1="210" x2="515" y2="210"/>
    <line x1="465" y1="250" x2="515" y2="250"/>
    <line x1="615" y1="150" x2="665" y2="150"/>
    <line x1="615" y1="190" x2="665" y2="190"/>
    <line x1="615" y1="230" x2="665" y2="230"/>
  </g>
  <!-- Robot units (Kiva-style) -->
  <g>
    <rect x="240" y="285" width="50" height="30" rx="6" fill="#F59E0B" opacity="0.9"/>
    <circle cx="252" cy="310" r="4" fill="rgba(0,0,0,0.3)"/>
    <circle cx="278" cy="310" r="4" fill="rgba(0,0,0,0.3)"/>
    <rect x="248" y="290" width="34" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  </g>
  <g>
    <rect x="420" y="245" width="50" height="30" rx="6" fill="#F59E0B" opacity="0.7"/>
    <circle cx="432" cy="270" r="4" fill="rgba(0,0,0,0.3)"/>
    <circle cx="458" cy="270" r="4" fill="rgba(0,0,0,0.3)"/>
    <rect x="428" y="250" width="34" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  </g>
  <!-- Movement paths -->
  <g stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="8,6" fill="none" opacity="0.4">
    <path d="M290 300 L400 300 L400 260 L420 260"/>
    <path d="M470 260 L560 260 L560 300"/>
  </g>
  <!-- Label -->
  <text x="400" y="60" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="monospace" font-size="14" letter-spacing="4">WAREHOUSE ROBOTICS</text>
</svg>