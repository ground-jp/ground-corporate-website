<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0C14;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1629;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:rgba(59,130,246,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(59,130,246,0)"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg2)"/>
  <rect width="800" height="400" fill="url(#spotlight)"/>
  <!-- Grid -->
  <g stroke="rgba(59,130,246,0.08)" stroke-width="1">
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="310" x2="800" y2="310"/>
    <line x1="100" y1="250" x2="100" y2="400"/>
    <line x1="250" y1="250" x2="250" y2="400"/>
    <line x1="400" y1="250" x2="400" y2="400"/>
    <line x1="550" y1="250" x2="550" y2="400"/>
    <line x1="700" y1="250" x2="700" y2="400"/>
  </g>
  <!-- Butler Robot Body -->
  <g transform="translate(340, 180)">
    <!-- Base platform -->
    <rect x="0" y="80" width="120" height="40" rx="8" fill="#3B82F6" opacity="0.9"/>
    <!-- Wheels -->
    <circle cx="25" cy="125" r="10" fill="#1e3a5f" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="95" cy="125" r="10" fill="#1e3a5f" stroke="#3B82F6" stroke-width="2"/>
    <!-- Lifting mechanism -->
    <rect x="15" y="60" width="90" height="25" rx="4" fill="rgba(59,130,246,0.6)"/>
    <rect x="25" y="65" width="10" height="15" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="55" y="65" width="10" height="15" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="85" y="65" width="10" height="15" rx="2" fill="rgba(255,255,255,0.2)"/>
    <!-- Shelf on top -->
    <rect x="-10" y="10" width="140" height="50" rx="4" fill="rgba(139,92,246,0.3)" stroke="rgba(139,92,246,0.5)" stroke-width="1.5"/>
    <rect x="0" y="20" width="120" height="10" rx="2" fill="rgba(139,92,246,0.2)"/>
    <rect x="0" y="40" width="120" height="10" rx="2" fill="rgba(139,92,246,0.2)"/>
    <!-- Status light -->
    <circle cx="60" cy="90" r="5" fill="#10B981">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Movement arrows -->
  <g stroke="rgba(59,130,246,0.3)" stroke-width="2" fill="none" stroke-dasharray="6,4">
    <path d="M280 290 L340 290"/>
    <path d="M460 290 L540 290"/>
  </g>
  <polygon points="340,285 340,295 350,290" fill="rgba(59,130,246,0.3)"/>
  <polygon points="540,285 540,295 550,290" fill="rgba(59,130,246,0.3)"/>
  <!-- Label -->
  <text x="400" y="50" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="monospace" font-size="13" letter-spacing="4">BUTLER® AUTONOMOUS MOBILE ROBOT</text>
</svg>