<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0C14;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg5)"/>
  <!-- Map of Japan outline (simplified) -->
  <g fill="none" stroke="rgba(59,130,246,0.12)" stroke-width="1.5">
    <path d="M350,80 Q380,60 420,70 Q450,80 460,110 Q470,140 450,170 Q440,200 420,220 Q410,240 390,260 Q380,280 370,300 Q360,320 350,340"/>
    <path d="M450,110 Q480,100 510,120 Q530,140 520,170 Q510,190 490,200"/>
  </g>
  <!-- Network connections -->
  <g stroke="rgba(59,130,246,0.15)" stroke-width="1">
    <line x1="400" y1="200" x2="300" y2="160"/>
    <line x1="400" y1="200" x2="500" y2="140"/>
    <line x1="400" y1="200" x2="350" y2="280"/>
    <line x1="400" y1="200" x2="460" y2="250"/>
    <line x1="400" y1="200" x2="320" y2="230"/>
    <line x1="400" y1="200" x2="450" y2="180"/>
    <line x1="400" y1="200" x2="380" y2="140"/>
    <line x1="400" y1="200" x2="430" y2="300"/>
    <line x1="300" y1="160" x2="250" y2="130"/>
    <line x1="500" y1="140" x2="560" y2="120"/>
    <line x1="350" y1="280" x2="300" y2="310"/>
    <line x1="460" y1="250" x2="520" y2="280"/>
  </g>
  <!-- Central hub -->
  <circle cx="400" cy="200" r="30" fill="url(#nodeGlow)"/>
  <circle cx="400" cy="200" r="18" fill="rgba(59,130,246,0.3)" stroke="#3B82F6" stroke-width="2"/>
  <text x="400" y="204" text-anchor="middle" fill="#fff" font-family="monospace" font-size="9" font-weight="bold">GWES</text>
  <!-- Deployment nodes -->
  <circle cx="300" cy="160" r="10" fill="rgba(16,185,129,0.3)" stroke="#10B981" stroke-width="1.5">
    <animate attributeName="r" values="10;12;10" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="140" r="10" fill="rgba(16,185,129,0.3)" stroke="#10B981" stroke-width="1.5">
    <animate attributeName="r" values="10;12;10" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="280" r="8" fill="rgba(245,158,11,0.3)" stroke="#F59E0B" stroke-width="1.5"/>
  <circle cx="460" cy="250" r="8" fill="rgba(245,158,11,0.3)" stroke="#F59E0B" stroke-width="1.5"/>
  <circle cx="320" cy="230" r="6" fill="rgba(139,92,246,0.3)" stroke="#8B5CF6" stroke-width="1.5"/>
  <circle cx="450" cy="180" r="6" fill="rgba(139,92,246,0.3)" stroke="#8B5CF6" stroke-width="1.5"/>
  <circle cx="380" cy="140" r="7" fill="rgba(236,72,153,0.3)" stroke="#EC4899" stroke-width="1.5"/>
  <circle cx="430" cy="300" r="7" fill="rgba(236,72,153,0.3)" stroke="#EC4899" stroke-width="1.5"/>
  <circle cx="250" cy="130" r="5" fill="rgba(99,102,241,0.3)" stroke="#6366F1" stroke-width="1"/>
  <circle cx="560" cy="120" r="5" fill="rgba(99,102,241,0.3)" stroke="#6366F1" stroke-width="1"/>
  <circle cx="300" cy="310" r="5" fill="rgba(99,102,241,0.3)" stroke="#6366F1" stroke-width="1"/>
  <circle cx="520" cy="280" r="5" fill="rgba(99,102,241,0.3)" stroke="#6366F1" stroke-width="1"/>
  <!-- Counter -->
  <g transform="translate(620, 100)">
    <text x="0" y="0" fill="rgba(255,255,255,0.3)" font-family="monospace" font-size="11" letter-spacing="2">DEPLOYMENTS</text>
    <text x="0" y="40" fill="#3B82F6" font-family="monospace" font-size="48" font-weight="bold">1,000</text>
    <text x="0" y="60" fill="rgba(255,255,255,0.3)" font-family="monospace" font-size="11" letter-spacing="2">TARGET: 2027</text>
  </g>
  <!-- Legend -->
  <g transform="translate(620, 260)">
    <circle cx="8" cy="0" r="5" fill="rgba(16,185,129,0.3)" stroke="#10B981" stroke-width="1"/>
    <text x="20" y="4" fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="10">Major clients</text>
    <circle cx="8" cy="24" r="5" fill="rgba(245,158,11,0.3)" stroke="#F59E0B" stroke-width="1"/>
    <text x="20" y="28" fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="10">Expanding</text>
    <circle cx="8" cy="48" r="5" fill="rgba(139,92,246,0.3)" stroke="#8B5CF6" stroke-width="1"/>
    <text x="20" y="52" fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="10">New sites</text>
  </g>
</svg>