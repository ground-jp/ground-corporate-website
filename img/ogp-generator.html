<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GROUND Inc. OGP Image Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1d2e;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      gap: 20px;
    }

    .container {
      text-align: center;
    }

    h1 {
      color: #ffffff;
      margin-bottom: 10px;
      font-size: 24px;
    }

    p {
      color: #60a5fa;
      margin-bottom: 20px;
      font-size: 14px;
    }

    canvas {
      border: 2px solid #60a5fa;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(96, 165, 250, 0.2);
      max-width: 100%;
      height: auto;
    }

    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    .download-btn {
      background: #60a5fa;
      color: #0a0c14;
    }

    .download-btn:hover {
      background: #3b82f6;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(96, 165, 250, 0.4);
    }

    .copy-btn {
      background: #374151;
      color: #ffffff;
    }

    .copy-btn:hover {
      background: #4b5563;
      transform: translateY(-2px);
    }

    .info {
      color: #9ca3af;
      font-size: 12px;
      margin-top: 15px;
      max-width: 600px;
    }

    .copy-success {
      color: #4ade80;
      font-size: 12px;
      margin-top: 10px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .copy-success.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GROUND Inc. OGP Image</h1>
    <p>1200x630px - Standard Open Graph Protocol image</p>

    <canvas id="ogpCanvas" width="1200" height="630"></canvas>

    <div class="button-group">
      <button class="download-btn" onclick="downloadImage()">Download as PNG</button>
      <button class="copy-btn" onclick="copySVGCode()">Copy SVG Code</button>
    </div>

    <div class="copy-success" id="copySuccess">SVG code copied to clipboard!</div>

    <div class="info">
      <p>💡 Tip: You can right-click the canvas and "Save image as..." to save it directly, or use the Download button above.</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('ogpCanvas');
    const ctx = canvas.getContext('2d');

    function drawOGPImage() {
      const width = 1200;
      const height = 630;

      // Draw gradient background
      const gradient = ctx.createLinearGradient(0, 0, width, height);
      gradient.addColorStop(0, '#0A0C14');
      gradient.addColorStop(1, '#111820');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      // Draw grid pattern
      ctx.strokeStyle = 'rgba(30, 41, 59, 0.3)';
      ctx.lineWidth = 1;
      for (let i = 0; i < width; i += 60) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, height);
        ctx.stroke();
      }
      for (let i = 0; i < height; i += 60) {
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(width, i);
        ctx.stroke();
      }

      // Draw decorative circles (top right)
      ctx.strokeStyle = 'rgba(96, 165, 250, 0.15)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(1050, 80, 120, 0, Math.PI * 2);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(96, 165, 250, 0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(1050, 80, 80, 0, Math.PI * 2);
      ctx.stroke();

      // Draw decorative lines (left side)
      ctx.strokeStyle = 'rgba(96, 165, 250, 0.4)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, 200);
      ctx.lineTo(80, 200);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(96, 165, 250, 0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, 220);
      ctx.lineTo(60, 220);
      ctx.stroke();

      // Draw bottom right accent circle
      ctx.strokeStyle = 'rgba(30, 64, 175, 0.15)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(1100, 550, 100, 0, Math.PI * 2);
      ctx.stroke();

      // Draw right side accent bar
      ctx.fillStyle = 'rgba(96, 165, 250, 0.1)';
      ctx.fillRect(1170, 0, 30, height);

      // Draw top-left corner accent
      ctx.fillStyle = 'rgba(96, 165, 250, 0.5)';
      ctx.fillRect(0, 0, 8, 40);
      ctx.fillRect(0, 0, 40, 8);

      // Draw text
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 140px "Inter", sans-serif';
      ctx.letterSpacing = '-2px';
      ctx.textBaseline = 'bottom';
      ctx.fillText('GROUND', 120, 320);

      // Draw subtitle
      ctx.fillStyle = '#60A5FA';
      ctx.font = '600 42px "Inter", sans-serif';
      ctx.fillText('Intelligent Logistics', 120, 410);

      // Draw Japanese tagline
      ctx.fillStyle = '#FFFFFF';
      ctx.globalAlpha = 0.85;
      ctx.font = '500 28px "Noto Sans JP", sans-serif';
      ctx.fillText('AI・数理最適化・ロボティクスで物流の未来を変革する', 120, 475);
      ctx.globalAlpha = 1.0;
    }

    function downloadImage() {
      const link = document.createElement('a');
      link.download = 'ogp-default.png';
      link.href = canvas.toDataURL();
      link.click();
    }

    function copySVGCode() {
      const svgCode = `<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0C14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111820;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <text x="120" y="320" font-family="Inter, sans-serif" font-size="140" font-weight="800" fill="#FFFFFF">GROUND</text>
  <text x="120" y="410" font-family="Inter, sans-serif" font-size="42" font-weight="600" fill="#60A5FA">Intelligent Logistics</text>
  <text x="120" y="475" font-family="Noto Sans JP, sans-serif" font-size="28" font-weight="500" fill="#FFFFFF" opacity="0.85">AI・数理最適化・ロボティクスで物流の未来を変革する</text>
</svg>`;

      navigator.clipboard.writeText(svgCode).then(() => {
        const successMsg = document.getElementById('copySuccess');
        successMsg.classList.add('show');
        setTimeout(() => {
          successMsg.classList.remove('show');
        }, 2000);
      });
    }

    // Draw the image on page load
    window.addEventListener('load', drawOGPImage);
  </script>
<!-- Cookie Consent Banner -->
<div id="cc-banner" class="cc-banner" role="dialog" aria-labelledby="cc-title">
  <div class="cc-banner__content">
    <p id="cc-title" class="cc-banner__text">当サイトでは、サービス向上のためCookieを使用しています。</p>
    <div class="cc-banner__buttons">
      <button id="cc-accept" class="cc-banner__button cc-banner__button--accept" aria-label="同意する">同意する</button>
      <a href="privacy.html" class="cc-banner__link" aria-label="詳細">詳細</a>
    </div>
  </div>
</div>

<style>
  .cc-banner {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background-color: rgba(10, 12, 20, 0.95);
    z-index: 9999;
    padding: 16px 20px;
    box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.2);
    font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    animation: cc-slide-up 0.3s ease-out;
    display: none;
  }

  .cc-banner.cc-show {
    display: block;
  }

  @keyframes cc-slide-up {
    from {
      transform: translateY(100%);
      opacity: 0;
    }
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  @keyframes cc-slide-down {
    from {
      transform: translateY(0);
      opacity: 1;
    }
    to {
      transform: translateY(100%);
      opacity: 0;
    }
  }

  .cc-banner.cc-hide {
    animation: cc-slide-down 0.3s ease-in forwards;
  }

  .cc-banner__content {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .cc-banner__text {
    color: #ffffff;
    font-size: 13px;
    line-height: 1.5;
    margin: 0;
    flex: 1;
  }

  .cc-banner__buttons {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .cc-banner__button {
    padding: 8px 16px;
    background-color: #3B82F6;
    color: #ffffff;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    transition: background-color 0.2s ease;
    white-space: nowrap;
  }

  .cc-banner__button:hover {
    background-color: #2563EB;
  }

  .cc-banner__button:active {
    background-color: #1D4ED8;
  }

  .cc-banner__link {
    color: #ffffff;
    text-decoration: underline;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s ease;
  }

  .cc-banner__link:hover {
    opacity: 0.8;
  }

  /* Mobile responsive */
  @media (max-width: 640px) {
    .cc-banner__content {
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }

    .cc-banner__buttons {
      width: 100%;
      gap: 8px;
    }

    .cc-banner__button {
      flex: 1;
    }

    .cc-banner__link {
      flex: 1;
    }
  }
</style>

<script>
  (function() {
    const CONSENT_KEY = 'ground_cookie_consent';
    const banner = document.getElementById('cc-banner');
    const acceptBtn = document.getElementById('cc-accept');

    function getConsent() {
      try {
        return localStorage.getItem(CONSENT_KEY);
      } catch (e) {
        return null;
      }
    }

    function setConsent(value) {
      try {
        localStorage.setItem(CONSENT_KEY, value);
      } catch (e) {
        // Fallback if localStorage is not available
      }
    }

    function hideBanner() {
      if (banner) {
        banner.classList.remove('cc-show');
        banner.classList.add('cc-hide');
        setTimeout(() => {
          banner.style.display = 'none';
        }, 300);
      }
    }

    function showBanner() {
      if (banner) {
        banner.classList.add('cc-show');
        banner.classList.remove('cc-hide');
      }
    }

    // Check if consent was already given
    if (!getConsent()) {
      showBanner();
    }

    // Accept button handler
    if (acceptBtn) {
      acceptBtn.addEventListener('click', function() {
        setConsent('accepted');
        hideBanner();
      });
    }

    // Close banner on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && banner && banner.classList.contains('cc-show')) {
        setConsent('accepted');
        hideBanner();
      }
    });
  })();
</script>

</body>
</html>
