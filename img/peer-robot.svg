<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" width="560" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#151b2e"/>
    </linearGradient>
    <linearGradient id="robotBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="560" height="400" fill="url(#bg)"/>
  <!-- Large P letter background -->
  <text x="280" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="280" font-weight="bold" fill="#1a2040" opacity="0.4">P</text>
  <!-- Simple robot silhouette -->
  <g transform="translate(280, 200)">
    <!-- Robot body -->
    <rect x="-40" y="-20" width="80" height="100" rx="8" fill="url(#robotBody)" opacity="0.9"/>
    <!-- Robot head -->
    <rect x="-30" y="-55" width="60" height="40" rx="6" fill="#d0d0d0" opacity="0.9"/>
    <!-- Eyes -->
    <circle cx="-12" cy="-38" r="6" fill="#4a90d9"/>
    <circle cx="12" cy="-38" r="6" fill="#4a90d9"/>
    <!-- Antenna -->
    <line x1="0" y1="-55" x2="0" y2="-70" stroke="#a0a0a0" stroke-width="3"/>
    <circle cx="0" cy="-73" r="4" fill="#5BC0EB"/>
    <!-- Tray/shelf -->
    <rect x="-50" y="80" width="100" height="8" rx="3" fill="#c0c0c0" opacity="0.8"/>
    <!-- Wheels -->
    <circle cx="-25" cy="100" r="10" fill="#606060"/>
    <circle cx="25" cy="100" r="10" fill="#606060"/>
  </g>
  <!-- PEER text overlay -->
  <text x="280" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.3)" letter-spacing="0.3em">PEER</text>
</svg>