<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 60">
  <defs>
    <!-- White-to-Titanium gradient for GROUND logo (dark background) -->
    <linearGradient id="wtf" x1="0" y1="0" x2="0" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="65%" stop-color="#FFFFFF"/>
      <stop offset="80%" stop-color="#F9FAFA"/>
      <stop offset="90%" stop-color="#EFF0F1"/>
      <stop offset="95%" stop-color="#E8E9EB"/>
      <stop offset="100%" stop-color="#E0E1E4"/>
    </linearGradient>
  </defs>

  <!-- === GROUND Logo (left side) === -->
  <g transform="translate(0, 6)">
    <!-- G Mark: correct G shape with opening on upper-right side -->
    <path fill="url(#wtf)"
          d="M0 0 H60 V3.77 H3.77 V26.4 H56.57 V15.07 H60 V30.17 H0 Z"/>
    <!-- Wordmark -->
    <text x="72" y="24"
          font-family="'Liberation Sans',Arial,Helvetica,sans-serif"
          font-weight="700" font-size="28" letter-spacing="-0.3"
          fill="url(#wtf)"
          stroke="#0a0c14" stroke-width="0.5" stroke-linejoin="round"
          paint-order="fill stroke">GROUND</text>
    <!-- Tagline removed -->
  </g>

  <!-- === Divider === -->
  <line x1="310" y1="10" x2="310" y2="50" stroke="#C8CDD8" stroke-opacity="0.2" stroke-width="0.5"/>

  <!-- === GWES Lockup (right side) === -->
  <g transform="translate(340, 6)">
    <!-- Particle grid icon -->
    <g transform="translate(0, 0) scale(0.22)">
      <circle cx="100" cy="100" r="7" fill="#ffffff" opacity="0.9"/>
      <circle cx="80" cy="100" r="6" fill="#f0f5fa" opacity="0.85"/>
      <circle cx="120" cy="100" r="6" fill="#f0f5fa" opacity="0.85"/>
      <circle cx="100" cy="80" r="6" fill="#f0f5fa" opacity="0.85"/>
      <circle cx="100" cy="120" r="6" fill="#f0f5fa" opacity="0.85"/>
      <circle cx="80" cy="80" r="5.5" fill="#d0e4f2" opacity="0.75"/>
      <circle cx="120" cy="80" r="5.5" fill="#d0e4f2" opacity="0.75"/>
      <circle cx="80" cy="120" r="5.5" fill="#d0e4f2" opacity="0.75"/>
      <circle cx="120" cy="120" r="5.5" fill="#d0e4f2" opacity="0.75"/>
      <circle cx="60" cy="100" r="4.5" fill="#9dd4f0" opacity="0.55"/>
      <circle cx="140" cy="100" r="4.5" fill="#9dd4f0" opacity="0.55"/>
      <circle cx="100" cy="60" r="4.5" fill="#9dd4f0" opacity="0.55"/>
      <circle cx="100" cy="140" r="4.5" fill="#9dd4f0" opacity="0.55"/>
      <circle cx="60" cy="80" r="4" fill="#7dcbee" opacity="0.4"/>
      <circle cx="140" cy="80" r="4" fill="#7dcbee" opacity="0.4"/>
      <circle cx="60" cy="120" r="4" fill="#7dcbee" opacity="0.4"/>
      <circle cx="140" cy="120" r="4" fill="#7dcbee" opacity="0.4"/>
      <circle cx="80" cy="60" r="4" fill="#7dcbee" opacity="0.4"/>
      <circle cx="120" cy="60" r="4" fill="#7dcbee" opacity="0.4"/>
      <circle cx="80" cy="140" r="4" fill="#7dcbee" opacity="0.4"/>
      <circle cx="120" cy="140" r="4" fill="#7dcbee" opacity="0.4"/>
      <circle cx="60" cy="60" r="3.5" fill="#5bc0eb" opacity="0.2"/>
      <circle cx="140" cy="60" r="3.5" fill="#5bc0eb" opacity="0.2"/>
      <circle cx="60" cy="140" r="3.5" fill="#5bc0eb" opacity="0.2"/>
      <circle cx="140" cy="140" r="3.5" fill="#5bc0eb" opacity="0.2"/>
    </g>
    <!-- GWES text -->
    <text x="56" y="24"
          font-family="'Liberation Sans',Arial,Helvetica,sans-serif"
          font-weight="700" font-size="20" letter-spacing="6"
          fill="#C8CDD8">GWES</text>
    <!-- Tagline -->
    <text x="56" y="36"
          font-family="Inter,Arial,sans-serif"
          font-weight="400" font-size="5" fill="#FFFFFF"
          letter-spacing="0.15">The OS for Autonomous Warehouse</text>
  </g>
</svg>
