var ids = ['a','b','c','d','e'];
setInterval(function(){
  for(var i=0;i<videos.length;i++){
    var v=videos[i];
    var el=document.getElementById(ids[i]);
    if(el) el.textContent = 'paused='+v.paused+' ready='+v.readyState+' muted='+v.muted+' err='+(v.error?v.error.code:'none')+' w='+v.videoWidth;

},500);
</script>
